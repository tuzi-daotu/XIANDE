<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二次元游戏导航站</title>
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #1a0b2e;
            transition: background-image 1s ease-in-out;
        }

        /* 页面切换逻辑 */
        .page {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .page.active {
            display: flex;
        }

        /* 封面页样式 */
        #page1 {
            justify-content: center;
            align-items: center;
        }

        /* 点击进入按钮样式 */
        .cover-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #00C9FF, #92FE9D); 
            border: 2px solid rgba(255, 255, 255, 0.6);
            color: #0f3d3e; 
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 201, 255, 0.4);
            margin-top: 20px;
        }

        .cover-btn:hover {
            background: linear-gradient(45deg, #00d2ff, #a3ffce);
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 201, 255, 0.8);
            color: #000;
        }

        /* 回家的路按钮样式 */
        .home-btn {
            padding: 10px 25px;
            background: #ff4757;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            display: inline-block;
        }

        .home-btn:hover {
            background: #ff6b81;
            box-shadow: 0 0 15px #ff4757;
            transform: scale(1.05);
        }

        /* 顶部导航栏 */
        .top-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .nav-btn:hover {
            background: white;
            color: #2b1055;
        }

        /* 主容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            flex: 1;
        }

        /* 核心文案样式 */
        .quote-box {
            margin-bottom: 50px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .quote-text {
            font-size: 24px;
            line-height: 1.6;
            color: #fff;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .highlight {
            color: #ff9a9e;
            font-weight: bold;
            font-size: 28px;
            display: block;
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(255, 154, 158, 0.8);
        }

        /* 游戏列表网格 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* 游戏卡片样式 */
        .game-card {
            display: block;
            padding: 25px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 18px;
            font-weight: bold;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .game-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-color: #ff9a9e;
            border-width: 2px;
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #ddd;
            margin-top: 50px;
            background: rgba(0,0,0,0.3);
        }

        /* 鼠标拖尾特效层 - 修复滚动问题 */
        .cursor-effect {
            position: absolute; /* 改为绝对定位，跟随文档流 */
            pointer-events: none;
            z-index: 9999;
            font-size: 20px;
            animation: fadeOut 1s linear forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0) translateY(20px); }
        }
    </style>
</head>
<body>

    <!-- 第一页：封面 -->
    <div id="page1" class="page">
        <div class="quote-box" style="max-width: 600px; text-align: center;">
            <div class="quote-text">
                点击下方按钮，立刻查看你的
                <span class="highlight">四季二次元启动器</span>
            </div>
        </div>
        
        <!-- 进入按钮 -->
        <button onclick="enterSite()" class="cover-btn">点击进入</button>
        
        <!-- 回家的路 -->
        <div style="margin-top: 30px;">
            <a href="https://www.bilibili.com/video/BV1GJ411x7h7/" target="_blank" class="home-btn">
                回家的路
            </a>
        </div>
    </div>

    <!-- 第二页：内容 -->
    <div id="page2" class="page">
        <!-- 顶部导航 -->
        <nav class="top-nav">
            <a href="https://store.steampowered.com/" target="_blank" class="nav-btn">Steam 官网</a>
            <a href="https://www.epicgames.com/store/zh-CN/" target="_blank" class="nav-btn">Epic Games 官网</a>
            <a href="https://www.bilibili.com/video/BV1GJ411x7h7/" target="_blank" class="home-btn">
                回家的路
            </a>
        </nav>

        <div class="container">
            <!-- 核心文案 -->
            <div class="quote-box">
                <div class="quote-text">
                    该更新的时候更新完了之后会很好玩
                    <span class="highlight">不该更新的时候做完任务会不好玩</span>
                </div>
            </div>

            <div class="game-grid">
                <a href="https://sr.mihoyo.com/" class="game-card">崩坏：星穹铁道</a>
                <a href="https://ys.mihoyo.com/" class="game-card">原神</a>
                <a href="https://zzz.mihoyo.com/" class="game-card">绝区零</a>
                <a href="https://mc.kurogame.com/" class="game-card">鸣潮</a>
                <a href="https://ak.hypergryph.com/#index" class="game-card">明日方舟</a>
                <a href="https://www.azurlane.com/" class="game-card">碧蓝航线</a>
                <a href="https://bh3.mihoyo.com/" class="game-card">崩坏3</a>
                <a href="https://bluearchive-cn.com/" class="game-card">蔚蓝档案</a>
            </div>

            <div class="game-grid">
                <a href="https://endfield.hypergryph.com/" class="game-card">明日方舟：终末地</a>
                <a href="https://fgo.wiki/w/Fate/Grand_Order#google_vignette" class="game-card">Fate/Grand Order</a>
                <a href="https://poster.taptap.cn/" class="game-card">重返未来：1999</a>
                <a href="https://yys.163.com/" class="game-card">阴阳师</a>
                <a href="https://www.benghuai.com/" class="game-card">崩坏学园2</a>
                <a href="https://ak.hypergryph.com/" class="game-card">明日方舟 (官服)</a>
            </div>
        </div>

        <div class="footer">
            <p>二次元游戏启动器</p>
        </div>
    </div>

    <script>
        // 页面切换逻辑
        window.onload = function() {
            document.getElementById('page1').classList.add('active');
            document.getElementById('page2').classList.remove('active');
            startSeasonRotation();
        };

        function enterSite() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
        }

        // 四季背景轮播逻辑
        function startSeasonRotation() {
            const spring = "linear-gradient(-45deg, #ff9a9e, #fecfef, #fecfef)";
            const summer = "linear-gradient(-45deg, #4facfe, #00f2fe, #43e97b)";
            const autumn = "linear-gradient(-45deg, #fa709a, #fee140, #ff5858)";
            const winter = "linear-gradient(-45deg, #e6dada, #2c3e50, #89f7fe)";

            const seasons = [spring, summer, autumn, winter];
            let currentSeason = 0;

            document.body.style.backgroundImage = seasons[currentSeason];
            document.body.style.backgroundSize = "400% 400%";
            document.body.style.animation = "gradientBG 15s ease infinite";

            setInterval(() => {
                currentSeason = (currentSeason + 1) % 4;
                document.body.style.backgroundImage = seasons[currentSeason];
            }, 3000);
        }

        // 鼠标拖尾特效逻辑 - 修复滚动错位
        let isHoveringCard = false;

        document.addEventListener('mousemove', function(e) {
            createParticle(e.pageX, e.pageY);
        });

        const cards = document.querySelectorAll('.game-card');
        cards.forEach(card => {
            card.addEventListener('mouseenter', () => isHoveringCard = true);
            card.addEventListener('mouseleave', () => isHoveringCard = false);
        });

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.classList.add('cursor-effect');
            
            const offsetX = (Math.random() - 0.5) * 20;
            const offsetY = (Math.random() - 0.5) * 20;
            
            // 使用 pageX/pageY 配合 absolute 定位，确保跟随滚动
            particle.style.left = (x + offsetX) + 'px';
            particle.style.top = (y + offsetY) + 'px';

            if (isHoveringCard) {
                particle.innerHTML = '❄️';
                particle.style.fontSize = (Math.random() * 15 + 10) + 'px';
            } else {
                particle.innerHTML = '🌸';
                particle.style.fontSize = (Math.random() * 15 + 10) + 'px';
            }

            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 1000);
        }
    </script>

</body>
</html>
